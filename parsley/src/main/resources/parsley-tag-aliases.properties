# Parsley built-in tag shortcuts.
#
# Each entry is  alias = target  and is loaded by parsley.ParsleyTagRegistry
# (every parsley-tag-aliases.properties on the classpath is read). Resolution is
# recursive, so these compose with replacements contributed by frameworks/apps
# (e.g. ERExtensions maps WOString = ERXWOString, giving str -> WOString -> ERXWOString).

else = ERXElse
# not in 5.4
condition = ERXWOConditional
conditional = ERXWOConditional
if = ERXWOConditional
actionURL = WOActionURL
activeImage = WOActiveImage
applet = WOApplet
body = WOBody
browser = WOBrowser
checkBox = WOCheckBox
# not in 5.4 (5.4 is case insensitive)
checkbox = WOCheckBox
checkBoxList = WOCheckBoxList
componentContent = WOComponentContent
content = WOComponentContent
embedded = WOEmbeddedObject
embeddedObject = WOEmbeddedObject
fileUpload = WOFileUpload
upload = WOFileUpload
form = WOForm
frame = WOFrame
container = WOGenericContainer
genericContainer = WOGenericContainer
element = WOGenericElement
genericElement = WOGenericElement
# not in 5.4
hidden = WOHiddenField
hiddenField = WOHiddenField
comment = WOHTMLCommentString
commentString = WOHTMLCommentString
hyperlink = WOHyperlink
link = WOHyperlink
image = WOImage
# not in 5.4
img = WOImage
imageButton = WOImageButton
inputList = WOInputList
javaScript = WOJavaScript
nestedList = WONestedList
noContent = WONoContentElement
noContentElement = WONoContentElement
param = WOParam
password = WOPasswordField
passwordField = WOPasswordField
popUpButton = WOPopUpButton
# not in 5.4
select = WOPopUpButton
quickTime = WOQuickTime
radio = WORadioButton
radioButton = WORadioButton
radioButtonList = WORadioButtonList
foreach = WORepetition
# not in 5.4
loop = WORepetition
repeat = WORepetition
repetition = WORepetition
reset = WOResetButton
resetButton = WOResetButton
resourceURL = WOResourceURL
search = WOSearchField
searchfield = WOSearchField
# not in 5.4
str = WOString
string = WOString
submit = WOSubmitButton
submitButton = WOSubmitButton
switch = WOSwitchComponent
switchComponent = WOSwitchComponent
text = WOText
textField = WOTextField
# not in 5.4 (5.4 is case insensitive)
textfield = WOTextField
VBScript = WOVBScript
XMLNode = WOXMLNode
