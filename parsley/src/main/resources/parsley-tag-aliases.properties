# Parsley built-in tag shortcuts.
#
# Each entry is  alias = target  and is loaded by parsley.ParsleyTagRegistry
# (every parsley-tag-aliases.properties on the classpath is read). Resolution is
# recursive, so these compose with replacements contributed by frameworks/apps
# (e.g. ERExtensions maps WOString = ERXWOString, giving str -> WOString -> ERXWOString).

else = ERXElse
condition = ERXWOConditional
conditional = ERXWOConditional
if = ERXWOConditional
